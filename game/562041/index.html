<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結論互動遊戲：尋找你的夥伴</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .status { color: #666; font-style: italic; }
        .card { display: none; padding: 20px; border-radius: 15px; margin-top: 20px; border-top: 10px solid; }
        /* 根據來源資料結構設計的卡片顏色 */
        .Main { background: #e8f0fe; border-color: #4285f4; } /* 主點：重複引言內容 */
        .Focus { background: #e6f4ea; border-color: #34a853; } /* 焦點：強調正文數據 */
        .Body { background: #fef7e0; border-color: #fbbc05; } /* 原文：正文細節 */
        .type-tag { font-size: 0.8em; font-weight: bold; text-transform: uppercase; color: #555; margin-bottom: 10px; display: block; }
        .text-content { font-size: 1.4em; font-weight: bold; color: #222; margin-bottom: 20px; }
        .instruction { text-align: left; font-size: 0.9em; line-height: 1.5; color: #444; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        b { color: #d93025; }
    </style>
</head>
<body>

<div class="card-container">
    <div id="loading" class="status">正在連線至 Firebase 並分配角色...</div>

    <div id="gameCard" class="card">
        <span id="typeTag" class="type-tag"></span>
        <div id="textContent" class="text-content"></div>

    </div>
    <button id="resetBtn" onclick="resetGame()" style="margin-top:20px; padding:8px 16px; font-size:14px; background:#d93025; color:white; border:none; border-radius:8px; cursor:pointer;">重置抽籤</button>
</div>

<script>
    // Firebase 配置從 config.js 載入 (window.FIREBASE_CONFIG)
    if (!window.FIREBASE_CONFIG) {
        document.getElementById('loading').innerText = "設定檔載入失敗，請聯絡管理員。";
        throw new Error("config.js not loaded");
    }
    firebase.initializeApp(window.FIREBASE_CONFIG);
    const db = firebase.database();

    // 題庫：7 組，每組 3 張 (Main / Focus / Body)
    const groups = [
        { main: "Amazing applications", focus: "Remember: 2,000 free games", body: "Data: 30 apps; Over 2,000 free downloads" },
        { main: "Long battery life", focus: "Remember: 100 hours per charge", body: "Data: 100 hours between charges; 3-year guarantee" },
        { main: "Easy to play", focus: "Remember: Always in tune!", body: "Data: Automatic tuning; Light body" },
        { main: "Flexible sound", focus: "From mellow acoustic to heavy metal thunder!", body: "Data: Built-in synthesizer; 6-tone settings" },
        { main: "Getting the car ready", focus: "Don't forget: tires last twice as long", body: "Data: Set emergency brake; Block other tires" },
        { main: "Powerful engine", focus: "Don't forget: it has 2000 cc", body: "Data: 2000 cc capacity; Engine power details" },
        { main: "About the sights", focus: "Remember: mountains are most beautiful in fall", body: "Data: Northernmost city; Describe where it is" }
    ];

    // 從 Firebase 讀取已打亂的卡片，再用 transaction 分配
    const indexRef = db.ref('current_index');
    const cardsRef = db.ref('shuffled_cards');

    cardsRef.once('value').then(snap => {
        const shuffled = snap.val();
        if (!shuffled || shuffled.length === 0) {
            document.getElementById('loading').innerText = "遊戲尚未開始，請等老師重置抽籤。";
            return;
        }
        indexRef.transaction(v => (v || 0) + 1, (error, committed, snapshot) => {
            if (committed) {
                const index = snapshot.val() - 1;
                if (index < shuffled.length) {
                    displayCard(shuffled[index]);
                } else {
                    document.getElementById('loading').innerText = "名額已滿，請觀察其他組別互動！";
                }
            } else {
                document.getElementById('loading').innerText = "連線失敗，請重新掃碼。";
            }
        });
    });

    async function sha256(text) {
        const data = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    async function resetGame() {
        const pwd = prompt("請輸入管理密碼：");
        if (!pwd) return;
        const hash = await sha256(pwd);
        const snap = await db.ref('admin_password_hash').once('value');
        if (hash !== snap.val()) { alert("密碼錯誤！"); return; }

        const countStr = prompt("請輸入遊戲人數（須為 3 的倍數，最多 21）：", "21");
        if (!countStr) return;
        const count = parseInt(countStr);
        if (isNaN(count) || count % 3 !== 0 || count < 3 || count > 21) {
            alert("請輸入 3 的倍數（3~21）！");
            return;
        }

        // 隨機選組、打亂卡片，存入 Firebase
        const picked = shuffle([...groups]).slice(0, count / 3);
        let cards = [];
        picked.forEach((g, i) => {
            cards.push({ type: "Main", text: g.main, group: i + 1 });
            cards.push({ type: "Focus", text: g.focus, group: i + 1 });
            cards.push({ type: "Body", text: g.body, group: i + 1 });
        });
        shuffle(cards);

        await cardsRef.set(cards);
        await indexRef.set(0);
        alert("已重置！共 " + count + " 張卡片（" + (count / 3) + " 組）");
        location.reload();
    }

    function displayCard(cardData) {
        document.getElementById('loading').style.display = 'none';
        const cardDiv = document.getElementById('gameCard');
        cardDiv.style.display = 'block';
        cardDiv.classList.add(cardData.type);

        document.getElementById('typeTag').innerText =
            cardData.type === 'Main' ? "Main Point (重複引言重點)" :
            cardData.type === 'Focus' ? "Focus Point (強調正文焦點)" : "Body (正文細節數據)";

        document.getElementById('textContent').innerText = cardData.text;
    }
</script>

</body>
</html>
