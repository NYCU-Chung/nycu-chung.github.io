<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結論互動遊戲：尋找你的夥伴</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .status { color: #666; font-style: italic; }
        .card { display: none; padding: 20px; border-radius: 15px; margin-top: 20px; border-top: 10px solid; }
        /* 根據來源資料結構設計的卡片顏色 */
        .Main { background: #e8f0fe; border-color: #4285f4; } /* 主點：重複引言內容 */
        .Focus { background: #e6f4ea; border-color: #34a853; } /* 焦點：強調正文數據 */
        .Body { background: #fef7e0; border-color: #fbbc05; } /* 原文：正文細節 */
        .type-tag { font-size: 0.8em; font-weight: bold; text-transform: uppercase; color: #555; margin-bottom: 10px; display: block; }
        .text-content { font-size: 1.4em; font-weight: bold; color: #222; margin-bottom: 20px; }
        .instruction { text-align: left; font-size: 0.9em; line-height: 1.5; color: #444; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        b { color: #d93025; }
    </style>
</head>
<body>

<div class="card-container">
    <div id="loading" class="status">正在連線至 Firebase 並分配角色...</div>

    <div id="gameCard" class="card">
        <span id="typeTag" class="type-tag"></span>
        <div id="textContent" class="text-content"></div>

    </div>
</div>

<script>
    // Firebase 配置從 config.js 載入 (window.FIREBASE_CONFIG)
    if (!window.FIREBASE_CONFIG) {
        document.getElementById('loading').innerText = "設定檔載入失敗，請聯絡管理員。";
        throw new Error("config.js not loaded");
    }
    firebase.initializeApp(window.FIREBASE_CONFIG);
    const db = firebase.database();

    // 依據來源資料設計的 21 張字卡數據 [1][2][3][4]
    const cards = [
        {"group": 1, "text": "Amazing applications", "type": "Main"},
        {"group": 1, "text": "Remember: 2,000 free games", "type": "Focus"},
        {"group": 1, "text": "Data: 30 apps; Over 2,000 free downloads", "type": "Body"},
        {"group": 2, "text": "Long battery life", "type": "Main"},
        {"group": 2, "text": "Remember: 100 hours per charge", "type": "Focus"},
        {"group": 2, "text": "Data: 100 hours between charges; 3-year guarantee", "type": "Body"},
        {"group": 3, "text": "Easy to play", "type": "Main"},
        {"group": 3, "text": "Remember: Always in tune!", "type": "Focus"},
        {"group": 3, "text": "Data: Automatic tuning; Light body", "type": "Body"},
        {"group": 4, "text": "Flexible sound", "type": "Main"},
        {"group": 4, "text": "From mellow acoustic to heavy metal thunder!", "type": "Focus"},
        {"group": 4, "text": "Data: Built-in synthesizer; 6-tone settings", "type": "Body"},
        {"group": 5, "text": "Getting the car ready", "type": "Main"},
        {"group": 5, "text": "Don't forget: tires last twice as long", "type": "Focus"},
        {"group": 5, "text": "Data: Set emergency brake; Block other tires", "type": "Body"},
        {"group": 6, "text": "Powerful engine", "type": "Main"},
        {"group": 6, "text": "Don't forget: it has 2000 cc", "type": "Focus"},
        {"group": 6, "text": "Data: 2000 cc capacity; Engine power details", "type": "Body"},
        {"group": 7, "text": "About the sights", "type": "Main"},
        {"group": 7, "text": "Remember: mountains are most beautiful in fall", "type": "Focus"},
        {"group": 7, "text": "Data: Northernmost city; Describe where it is", "type": "Body"}
    ];

    // 先到先得邏輯：使用 Transaction 確保序號不重複
    const indexRef = db.ref('current_index');
    indexRef.transaction((currentValue) => {
        return (currentValue || 0) + 1;
    }, (error, committed, snapshot) => {
        if (committed) {
            const index = snapshot.val() - 1;
            if (index < cards.length) {
                displayCard(cards[index]);
            } else {
                document.getElementById('loading').innerText = "名額已滿，請觀察其他組別互動！";
            }
        } else {
            document.getElementById('loading').innerText = "連線失敗，請重新掃碼。";
        }
    });

    function displayCard(cardData) {
        document.getElementById('loading').style.display = 'none';
        const cardDiv = document.getElementById('gameCard');
        cardDiv.style.display = 'block';
        cardDiv.classList.add(cardData.type);

        document.getElementById('typeTag').innerText =
            cardData.type === 'Main' ? "Main Point (重複引言重點)" :
            cardData.type === 'Focus' ? "Focus Point (強調正文焦點)" : "Body (正文細節數據)";

        document.getElementById('textContent').innerText = cardData.text;
        document.getElementById('groupId').innerText = cardData.group;
    }
</script>

</body>
</html>
