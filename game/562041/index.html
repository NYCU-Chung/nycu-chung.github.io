<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結論互動遊戲 - 建立遊戲</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 420px; text-align: center; }
        h1 { color: #1a73e8; font-size: 1.4em; margin-bottom: 8px; }
        p.sub { color: #666; font-size: 0.9em; margin-bottom: 24px; }
        label { font-size: 0.95em; color: #333; }
        input[type=number] { padding: 10px; font-size: 16px; width: 80px; border: 1px solid #ccc; border-radius: 8px; text-align: center; margin: 0 8px; }
        button { padding: 12px 28px; font-size: 16px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #1557b0; }
        #result { display: none; margin-top: 24px; }
        #qrcode { margin: 16px auto; display: flex; justify-content: center; }
        .game-url { font-size: 0.8em; color: #888; word-break: break-all; margin-top: 8px; }
        .game-id { font-size: 2em; font-weight: bold; color: #1a73e8; letter-spacing: 6px; margin: 8px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup">
        <h1>Conclusion Matching Game</h1>
        <p class="sub">建立新遊戲，產生 QR Code 讓學生掃碼抽卡</p>
        <div>
            <label>遊戲人數（3 的倍數）：</label><br>
            <input type="number" id="playerCount" value="21" min="3" max="21" step="3">
        </div>
        <button onclick="createGame()">建立遊戲</button>
    </div>

    <div id="result">
        <h1>遊戲已建立！</h1>
        <div class="game-id" id="gameIdDisplay"></div>
        <div id="qrcode"></div>
        <p class="game-url" id="gameUrl"></p>
        <button onclick="document.getElementById('setup').style.display='block'; document.getElementById('result').style.display='none';">再建立一場</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    if (!window.FIREBASE_CONFIG) {
        document.body.innerText = "設定檔載入失敗";
        throw new Error("config.js not loaded");
    }
    firebase.initializeApp(window.FIREBASE_CONFIG);
    const db = firebase.database();

    const groups = [
        { main: "Amazing applications", focus: "Remember: 2,000 free games", body: "Data: 30 apps; Over 2,000 free downloads" },
        { main: "Long battery life", focus: "Remember: 100 hours per charge", body: "Data: 100 hours between charges; 3-year guarantee" },
        { main: "Easy to play", focus: "Remember: Always in tune!", body: "Data: Automatic tuning; Light body" },
        { main: "Flexible sound", focus: "From mellow acoustic to heavy metal thunder!", body: "Data: Built-in synthesizer; 6-tone settings" },
        { main: "Getting the car ready", focus: "Don't forget: tires last twice as long", body: "Data: Set emergency brake; Block other tires" },
        { main: "Powerful engine", focus: "Don't forget: it has 2000 cc", body: "Data: 2000 cc capacity; Engine power details" },
        { main: "About the sights", focus: "Remember: mountains are most beautiful in fall", body: "Data: Northernmost city; Describe where it is" }
    ];

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function genId() {
        return String(Math.floor(100000 + Math.random() * 900000));
    }

    async function createGame() {
        const count = parseInt(document.getElementById('playerCount').value);
        if (isNaN(count) || count % 3 !== 0 || count < 3 || count > 21) {
            alert("請輸入 3 的倍數（3~21）！");
            return;
        }

        const gameId = genId();
        const picked = shuffle([...groups]).slice(0, count / 3);

        // 產生不重複的兩位數 ID
        let idPool = [];
        for (let n = 10; n <= 99; n++) idPool.push(n);
        shuffle(idPool);

        let cards = [];
        picked.forEach((g, i) => {
            const group = i + 1;
            cards.push({ type: "Main", text: g.main, group: group, cardId: idPool.pop() });
            cards.push({ type: "Focus", text: g.focus, group: group, cardId: idPool.pop() });
            cards.push({ type: "Body", text: g.body, group: group, cardId: idPool.pop() });
        });
        shuffle(cards);

        await db.ref('games/' + gameId).set({
            cards: cards,
            current_index: 0,
            created: Date.now()
        });

        const playUrl = location.href.replace('index.html', '').replace(/\/$/, '') + '/play.html?id=' + gameId;

        document.getElementById('setup').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('gameIdDisplay').innerText = gameId;
        document.getElementById('gameUrl').innerText = playUrl;

        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById('qrcode'), {
            text: playUrl,
            width: 200,
            height: 200
        });
    }
</script>

</body>
</html>
