<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>簡報結論互動遊戲 - 尋找你的結論夥伴</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; }
        .input-group { margin: 20px 0; }
        input { padding: 10px; font-size: 16px; width: 100px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #1557b0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; }
        .card { padding: 20px; border: 2px solid #e0e0e0; border-radius: 8px; background: #fafafa; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
        .card-type { font-weight: bold; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; color: #5f6368; }
        .Main { border-top: 5px solid #4285f4; }
        .Focus { border-top: 5px solid #34a853; }
        .Body { border-top: 5px solid #fbbc05; }
        .instruction { margin-top: 20px; font-size: 14px; color: #666; text-align: left; background: #fffde7; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Conclusion Matching Game</h1>
    <p>根據來源資料設計：將主點、焦點與原文細節配對</p>

    <div class="input-group">
        <label>請輸入班級人數 (3的倍數): </label>
        <input type="number" id="studentCount" value="18" step="3" min="3">
        <button onclick="generateGame()">產生隨機字卡</button>
    </div>

    <div id="gameBoard" class="grid"></div>

    <div class="instruction">
        <strong>遊戲規則 (依據來源資料設計)：</strong>
        <ul>
            <li>每人隨機分配一張卡片。</li>
            <li><strong>目標：</strong> 三人一組（一個<b>Main Point</b> + 一個<b>Focus Point</b> + 一個<b>Body</b>）。</li>
            <li><strong>配對關鍵：</strong> Focus Point 的數據（如 2,000 或 100）必須能在 Body 中找到 [1, 2]。</li>
            <li><strong>口說任務：</strong> 找到組員後，請使用<b>過去式</b>練習說出結論句 [3]：<br>
                <i>"I talked about [Main Point]. Please remember [Focus Point]."</i>
            </li>
        </ul>
    </div>
</div>

<script>
    const database = [
        { main: "Amazing applications", focus: "Remember: 2,000 free games", body: "Has 30 apps; Over 2,000 free downloadable games" },
        { main: "Long battery life", focus: "Remember: 100 hours per charge", body: "100 hours between charges; 3-year guarantee" },
        { main: "Easy to play", focus: "Remember: Always in tune!", body: "Automatic tuning; Long, wide neck; Light body" },
        { main: "Flexible sound", focus: "From mellow acoustic to heavy metal thunder!", body: "Built-in synthesizer; 6-tone settings" },
        { main: "Getting the car ready", focus: "Don't forget: tires last twice as long", body: "Set emergency brake; Block the other tires" },
        { main: "About the sights", focus: "Remember: mountains are most beautiful in fall", body: "Northernmost city; Describing where it is" },
        { main: "Powerful engine", focus: "Don't forget: it has 2000 cc", body: "I told you about how powerful the engine is; 2000 cc capacity" },
        { main: "Speed of combination", focus: "You can reach 200 km per hour", body: "I talked about the speed of this combination" },
        { main: "Easy interface", focus: "Remember: Touchscreen typing", body: "Large 4-inch screen; Rightway Technology" },
        { main: "E-guitar Style", focus: "Remember: Your choice of shape and color!", body: "4 different body shapes; 10 different colors" }
    ];

    function generateGame() {
        const count = parseInt(document.getElementById('studentCount').value);
        if (count % 3 !== 0) {
            alert("請輸入3的倍數，以便三三成組！");
            return;
        }

        const groupCount = count / 3;
        // 隨機挑選組別並打亂
        let selectedGroups = [...database].sort(() => 0.5 - Math.random()).slice(0, groupCount);

        let allCards = [];
        selectedGroups.forEach((g, index) => {
            allCards.push({ type: 'Main', text: g.main, id: index });
            allCards.push({ type: 'Focus', text: g.focus, id: index });
            allCards.push({ type: 'Body', text: g.body, id: index });
        });

        // 打亂所有卡片順序
        allCards.sort(() => 0.5 - Math.random());

        const board = document.getElementById('gameBoard');
        board.innerHTML = '';
        allCards.forEach(card => {
            const div = document.createElement('div');
            div.className = `card ${card.type}`;
            div.innerHTML = `<div class="card-type">${card.type === 'Main' ? 'Main Point (引言重複)' : card.type === 'Focus' ? 'Focus Point (強調焦點)' : 'Body (原文細節)'}</div><div>${card.text}</div>`;
            board.appendChild(div);
        });
    }
</script>

</body>
</html>
