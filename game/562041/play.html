<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結論互動遊戲：抽卡</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .status { color: #666; font-style: italic; }
        .card { display: none; padding: 20px; border-radius: 15px; margin-top: 20px; border-top: 10px solid; }
        .Main { background: #e8f0fe; border-color: #4285f4; }
        .Focus { background: #e6f4ea; border-color: #34a853; }
        .Body { background: #fef7e0; border-color: #fbbc05; }
        .type-tag { font-size: 0.8em; font-weight: bold; text-transform: uppercase; color: #555; margin-bottom: 6px; display: block; }
        .card-id { font-size: 2.2em; font-weight: bold; color: #1a73e8; margin-bottom: 8px; }
        .text-content { font-size: 1.3em; font-weight: bold; color: #222; }
        .answer-section { display: none; margin-top: 20px; padding: 16px; background: #f8f9fa; border-radius: 12px; border: 1px solid #e0e0e0; }
        .answer-section label { font-size: 0.9em; color: #333; display: block; margin-bottom: 12px; }
        .answer-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 14px; }
        .answer-inputs input { padding: 10px; font-size: 18px; width: 70px; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
        .submit-btn { padding: 10px 24px; font-size: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .submit-btn:hover { background: #1557b0; }
        .submit-btn:disabled { background: #aaa; cursor: default; }
        .result-msg { margin-top: 12px; font-size: 1.1em; font-weight: bold; padding: 10px; border-radius: 8px; }
        .correct { background: #e6f4ea; color: #1e7e34; }
        .wrong { background: #fce8e6; color: #d93025; }
        .group-overview { margin-top: 16px; text-align: left; }
        .group-overview .group-item { padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid; }
        .group-overview .group-item.Main { background: #e8f0fe; border-color: #4285f4; }
        .group-overview .group-item.Focus { background: #e6f4ea; border-color: #34a853; }
        .group-overview .group-item.Body { background: #fef7e0; border-color: #fbbc05; }
        .group-overview .group-item .gi-tag { font-size: 0.75em; font-weight: bold; text-transform: uppercase; color: #555; }
        .group-overview .group-item .gi-text { font-weight: bold; color: #222; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="status">正在抽卡...</div>
    <div id="gameCard" class="card">
        <span id="typeTag" class="type-tag"></span>
        <div id="cardIdDisplay" class="card-id"></div>
        <div id="textContent" class="text-content"></div>
    </div>
    <div id="answerSection" class="answer-section">
        <label>輸入你的兩位夥伴的卡片編號：</label>
        <div class="answer-inputs">
            <input type="number" id="ans1" placeholder="#" min="10" max="99">
            <input type="number" id="ans2" placeholder="#" min="10" max="99">
        </div>
        <button class="submit-btn" id="submitBtn" onclick="checkAnswer()">提交答案</button>
        <div id="resultMsg"></div>
    </div>
</div>

<script>
    if (!window.FIREBASE_CONFIG) {
        document.getElementById('loading').innerText = "設定檔載入失敗，請聯絡管理員。";
        throw new Error("config.js not loaded");
    }
    firebase.initializeApp(window.FIREBASE_CONFIG);
    const db = firebase.database();

    const gameId = new URLSearchParams(location.search).get('id');
    if (!gameId) {
        document.getElementById('loading').innerText = "無效的遊戲連結。";
        throw new Error("no game id");
    }

    let allCards = null;
    let myCard = null;

    const storageKey = 'game_card_' + gameId;
    const cached = localStorage.getItem(storageKey);

    if (cached) {
        myCard = JSON.parse(cached);
        loadCardsAndShow();
    } else {
        const gameRef = db.ref('games/' + gameId);
        gameRef.once('value').then(snap => {
            const game = snap.val();
            if (!game || !game.cards) {
                document.getElementById('loading').innerText = "找不到此遊戲，可能已過期。";
                return;
            }
            allCards = game.cards;

            const indexRef = gameRef.child('current_index');
            indexRef.transaction(v => (v || 0) + 1, (error, committed, snapshot) => {
                if (committed) {
                    const index = snapshot.val() - 1;
                    if (index < allCards.length) {
                        myCard = allCards[index];
                        localStorage.setItem(storageKey, JSON.stringify(myCard));
                        displayCard(myCard);
                        document.getElementById('answerSection').style.display = 'block';
                    } else {
                        document.getElementById('loading').innerText = "名額已滿！";
                    }
                } else {
                    document.getElementById('loading').innerText = "連線失敗，請重新掃碼。";
                }
            });
        });
    }

    function loadCardsAndShow() {
        db.ref('games/' + gameId + '/cards').once('value').then(snap => {
            allCards = snap.val();
            displayCard(myCard);
            document.getElementById('answerSection').style.display = 'block';
        });
    }

    function displayCard(cardData) {
        document.getElementById('loading').style.display = 'none';
        const cardDiv = document.getElementById('gameCard');
        cardDiv.style.display = 'block';
        cardDiv.classList.add(cardData.type);

        document.getElementById('typeTag').innerText =
            cardData.type === 'Main' ? "Main Point (重複引言重點)" :
            cardData.type === 'Focus' ? "Focus Point (強調正文焦點)" : "Body (正文細節數據)";

        document.getElementById('cardIdDisplay').innerText = '#' + cardData.cardId;
        document.getElementById('textContent').innerText = cardData.text;
    }

    function showGroupOverview() {
        const typeOrder = { 'Main': 1, 'Focus': 2, 'Body': 3 };
        const typeLabel = { 'Main': 'Main Point (主點)', 'Focus': 'Focus Point (焦點)', 'Body': 'Body (原文)' };
        const groupCards = allCards
            .filter(c => c.group === myCard.group)
            .sort((a, b) => typeOrder[a.type] - typeOrder[b.type]);

        let html = '<div class="group-overview">';
        groupCards.forEach(c => {
            html += '<div class="group-item ' + c.type + '">'
                + '<div class="gi-tag">#' + c.cardId + ' ' + typeLabel[c.type] + '</div>'
                + '<div class="gi-text">' + c.text + '</div>'
                + '</div>';
        });
        html += '</div>';

        document.getElementById('answerSection').insertAdjacentHTML('beforeend', html);
    }

    function checkAnswer() {
        const a1 = parseInt(document.getElementById('ans1').value);
        const a2 = parseInt(document.getElementById('ans2').value);
        if (isNaN(a1) || isNaN(a2)) {
            alert("請輸入兩個夥伴的卡片編號！");
            return;
        }

        // 找出同組的其他兩張卡的 cardId
        const partners = allCards
            .filter(c => c.group === myCard.group && c.cardId !== myCard.cardId)
            .map(c => c.cardId);

        const answers = [a1, a2].sort((a, b) => a - b);
        const expected = partners.sort((a, b) => a - b);

        const msgDiv = document.getElementById('resultMsg');
        if (answers[0] === expected[0] && answers[1] === expected[1]) {
            msgDiv.className = 'result-msg correct';
            msgDiv.innerText = '正確！你找到夥伴了！';
            document.getElementById('submitBtn').disabled = true;
            showGroupOverview();
        } else {
            msgDiv.className = 'result-msg wrong';
            msgDiv.innerText = '答錯了，再試試看！';
        }
    }
</script>

</body>
</html>
