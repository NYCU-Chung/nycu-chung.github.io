<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYCU Chung - Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 3rem;
        }
        .tools-grid {
            display: grid;
            gap: 1.5rem;
            max-width: 400px;
            margin: 0 auto;
        }
        .tool-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .tool-card:hover {
            border-color: #6366f1;
            transform: translateY(-2px);
        }
        .tool-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .tool-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .tool-desc {
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tools</h1>
        <p class="subtitle">實用小工具集</p>
        <div class="tools-grid">
            <a href="/tools/video_converter/" class="tool-card">
                <div class="tool-icon">🎬</div>
                <div class="tool-name">影片/音訊轉換器</div>
                <div class="tool-desc">支援常見格式互轉，完全在瀏覽器中運行</div>
            </a>
        </div>
    </div>
</body>
</html>
