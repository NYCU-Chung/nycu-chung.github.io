<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tools - NYCU-Chung</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --link: #58a6ff;
            --link-hover: #79c0ff;
            --icon-folder: #8b949e;
            --icon-file: #8b949e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .header-icon {
            font-size: 1.5rem;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .breadcrumb a {
            color: var(--link);
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .breadcrumb .separator {
            color: var(--text-muted);
        }
        .breadcrumb .current {
            color: var(--text);
            font-weight: 500;
        }
        .file-list {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 0.625rem 1rem;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            transition: background 0.15s;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-item:hover {
            background: var(--bg-secondary);
        }
        .file-icon {
            width: 1.5rem;
            margin-right: 0.75rem;
            text-align: center;
            flex-shrink: 0;
        }
        .file-icon.folder {
            color: #54aeff;
        }
        .file-icon.file {
            color: var(--icon-file);
        }
        .file-name {
            flex: 1;
            color: var(--link);
            font-size: 0.9rem;
        }
        .file-item:hover .file-name {
            text-decoration: underline;
        }
        .file-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: right;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .footer a {
            color: var(--link);
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .file-desc {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="header-icon">📂</span>
            <h1>NYCU-Chung</h1>
        </div>

        <div class="breadcrumb">
            <a href="../">root</a>
            <span class="separator">/</span>
            <span class="current">tools</span>
        </div>

        <div class="file-list">
            <a href="../" class="file-item">
                <span class="file-icon folder">📁</span>
                <span class="file-name">..</span>
                <span class="file-desc"></span>
            </a>
            <a href="./video_converter/" class="file-item">
                <span class="file-icon folder">📁</span>
                <span class="file-name">video_converter</span>
                <span class="file-desc">影片/音訊格式轉換</span>
            </a>
            <a href="./voice-to-word/" class="file-item">
                <span class="file-icon folder">📁</span>
                <span class="file-name">voice-to-word</span>
                <span class="file-desc">語音轉文字 (Whisper AI)</span>
            </a>
        </div>

        <div class="footer">
            <a href="https://github.com/NYCU-Chung" target="_blank">GitHub</a>
        </div>
    </div>
</body>
</html>
