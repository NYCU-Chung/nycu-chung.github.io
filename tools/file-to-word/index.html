<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>檔案轉文字 | File to Text</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --warning: #f59e0b;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        select, input[type="number"] {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 1rem;
            cursor: pointer;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 0.75rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.15);
        }

        .upload-zone.has-file {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
        }

        .upload-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .upload-hint {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .file-info {
            color: var(--text);
            font-size: 0.9rem;
            margin-top: 0.75rem;
        }

        .file-info .filename {
            font-weight: 500;
            word-break: break-all;
        }

        .file-info .pages {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        #fileInput {
            display: none;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            padding: 0.85rem 1.75rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.85rem 1.75rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-small {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-small:hover {
            background: var(--border);
        }

        .btn-small.copied {
            background: var(--success);
            border-color: var(--success);
        }

        .btn-polish {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-color: #8b5cf6;
            color: white;
        }

        .btn-polish:hover {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
        }

        .progress-section {
            display: none;
            margin-top: 1.5rem;
        }

        .progress-section.visible {
            display: block;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--bg-input);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #8b5cf6);
            border-radius: 5px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-status {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }

        .result-section {
            display: none;
        }

        .result-section.visible {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .result-header h3 {
            font-size: 1rem;
        }

        .result-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .result-text {
            background: var(--bg-input);
            border-radius: 0.5rem;
            padding: 1rem;
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.95rem;
        }

        .result-text:empty::before {
            content: 'OCR 結果將顯示在這裡...';
            color: var(--text-muted);
        }

        .polish-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            display: none;
        }

        .polish-section.visible {
            display: block;
        }

        /* Preview Section */
        .preview-section {
            margin-top: 1rem;
            display: none;
        }

        .preview-section.visible {
            display: block;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .preview-header h3 {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .preview-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .preview-nav button {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.35rem 0.6rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .preview-nav button:hover {
            background: var(--border);
        }

        .preview-nav button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .preview-nav span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .preview-container {
            background: var(--bg-input);
            border-radius: 0.5rem;
            padding: 0.5rem;
            text-align: center;
            max-height: 400px;
            overflow: auto;
        }

        .preview-container canvas,
        .preview-container img {
            max-width: 100%;
            max-height: 380px;
            border-radius: 0.25rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            width: 90%;
            max-width: 420px;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 1rem;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal-body {
            padding: 1.25rem;
        }

        .modal-body p {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .modal-body a {
            color: var(--primary);
            text-decoration: none;
        }

        .modal-body a:hover {
            text-decoration: underline;
        }

        .modal-body input[type="password"] {
            width: 100%;
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.visible {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .loading-subtext {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .info {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        .info a {
            color: var(--primary);
            text-decoration: none;
        }

        .warning-box {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid var(--warning);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--warning);
        }

        @media (max-width: 600px) {
            .settings {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.5rem;
            }

            .btn-row {
                flex-direction: column;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 檔案轉文字</h1>
            <p class="subtitle">使用 OCR 技術從 PDF 或圖片中提取文字，支援繁體中文</p>
        </header>

        <div class="card">
            <div class="settings">
                <div class="setting-group">
                    <label for="language">語言 Language</label>
                    <select id="language">
                        <option value="chi_tra" selected>繁體中文</option>
                        <option value="chi_sim">簡體中文</option>
                        <option value="eng">English</option>
                        <option value="jpn">日本語</option>
                        <option value="kor">한국어</option>
                        <option value="chi_tra+eng">繁中+英文</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="pageRange">頁面範圍 (PDF)</label>
                    <input type="text" id="pageRange" placeholder="例: 1-5 或 1,3,5" value="">
                </div>
            </div>

            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">📁</div>
                <div class="upload-text">點擊或拖放檔案到此處</div>
                <div class="upload-hint">支援 PDF, PNG, JPG, JPEG, BMP, TIFF</div>
                <div class="file-info" id="fileInfo" style="display: none;">
                    <div class="filename" id="fileName"></div>
                    <div class="pages" id="pageCount"></div>
                </div>
            </div>
            <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.bmp,.tiff,.tif,image/*,application/pdf">

            <div class="btn-row" id="actionButtons" style="display: none;">
                <button class="btn-primary" id="startOcrBtn">
                    <span>🔍</span> 開始 OCR
                </button>
                <button class="btn-secondary" id="cancelBtn">取消</button>
            </div>

            <!-- Preview Section -->
            <div class="preview-section" id="previewSection">
                <div class="preview-header">
                    <h3>📷 預覽</h3>
                    <div class="preview-nav">
                        <button id="prevPage">&lt;</button>
                        <span id="pageIndicator">1 / 1</span>
                        <button id="nextPage">&gt;</button>
                    </div>
                </div>
                <div class="preview-container" id="previewContainer"></div>
            </div>

            <!-- Progress Section -->
            <div class="progress-section" id="progressSection">
                <div class="progress-label">
                    <span id="progressText">正在處理...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-status" id="progressStatus">準備中...</div>
            </div>
        </div>

        <!-- Result Section -->
        <div class="card result-section" id="resultSection">
            <div class="result-header">
                <h3>📝 OCR 結果</h3>
                <div class="result-actions">
                    <button class="btn-small btn-polish" id="polishBtn">✨ 潤飾</button>
                    <button class="btn-small" id="copyBtn">複製</button>
                    <button class="btn-small" id="downloadBtn">下載</button>
                    <button class="btn-small" id="clearBtn">清除</button>
                </div>
            </div>
            <div class="result-text" id="resultText"></div>

            <div class="polish-section" id="polishSection">
                <div class="result-header">
                    <h3>✨ 潤飾結果</h3>
                    <div class="result-actions">
                        <button class="btn-small" id="copyPolishBtn">複製</button>
                        <button class="btn-small" id="downloadPolishBtn">下載</button>
                    </div>
                </div>
                <div class="result-text" id="polishText"></div>
            </div>
        </div>

        <!-- API Key Modal -->
        <div class="modal-overlay" id="apiKeyModal">
            <div class="modal">
                <div class="modal-header">
                    <h3>🔑 設定 Groq API Key</h3>
                    <button class="modal-close" id="closeModal">&times;</button>
                </div>
                <div class="modal-body">
                    <p>請輸入您的 Groq API Key 以使用文字潤飾功能。</p>
                    <p><a href="https://console.groq.com/keys" target="_blank">點此免費取得 API Key →</a></p>
                    <input type="password" id="apiKeyInput" placeholder="gsk_xxxxxxxxxxxxxxxx" autocomplete="off">
                    <label class="checkbox-label">
                        <input type="checkbox" id="saveApiKey" checked>
                        記住 API Key（儲存於瀏覽器）
                    </label>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" id="cancelApiKey">取消</button>
                    <button class="btn-primary" id="confirmApiKey">確認</button>
                </div>
            </div>
        </div>

        <p class="info">
            由 <a href="https://tesseract.projectnaptha.com/" target="_blank">Tesseract.js</a>
            與 <a href="https://mozilla.github.io/pdf.js/" target="_blank">PDF.js</a> 驅動<br>
            所有處理皆在瀏覽器本地完成，檔案不會上傳至伺服器
        </p>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">正在載入 OCR 引擎...</div>
        <div class="loading-subtext" id="loadingSubtext">首次載入需要下載語言模型，請稍候</div>
    </div>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>

    <script type="module">
        // Import PDF.js
        const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

        // Import Tesseract.js
        const Tesseract = await import('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.esm.min.js').then(m => m.default || m);

        // DOM Elements
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const pageCount = document.getElementById('pageCount');
        const actionButtons = document.getElementById('actionButtons');
        const startOcrBtn = document.getElementById('startOcrBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const languageSelect = document.getElementById('language');
        const pageRangeInput = document.getElementById('pageRange');

        const previewSection = document.getElementById('previewSection');
        const previewContainer = document.getElementById('previewContainer');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageIndicator = document.getElementById('pageIndicator');

        const progressSection = document.getElementById('progressSection');
        const progressText = document.getElementById('progressText');
        const progressPercent = document.getElementById('progressPercent');
        const progressFill = document.getElementById('progressFill');
        const progressStatus = document.getElementById('progressStatus');

        const resultSection = document.getElementById('resultSection');
        const resultText = document.getElementById('resultText');
        const polishBtn = document.getElementById('polishBtn');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');

        const polishSection = document.getElementById('polishSection');
        const polishTextEl = document.getElementById('polishText');
        const copyPolishBtn = document.getElementById('copyPolishBtn');
        const downloadPolishBtn = document.getElementById('downloadPolishBtn');

        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingSubtext = document.getElementById('loadingSubtext');

        const apiKeyModal = document.getElementById('apiKeyModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveApiKeyCheckbox = document.getElementById('saveApiKey');
        const closeModal = document.getElementById('closeModal');
        const cancelApiKey = document.getElementById('cancelApiKey');
        const confirmApiKey = document.getElementById('confirmApiKey');

        // State
        let selectedFile = null;
        let pdfDoc = null;
        let currentPreviewPage = 1;
        let totalPages = 1;
        let worker = null;

        const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        const STORAGE_KEY = 'groq_api_key';

        // Helper functions
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function getApiKey() {
            return localStorage.getItem(STORAGE_KEY) || '';
        }

        function saveApiKeyToStorage(key) {
            localStorage.setItem(STORAGE_KEY, key);
        }

        function showApiKeyModal() {
            apiKeyInput.value = getApiKey();
            apiKeyModal.classList.add('visible');
            apiKeyInput.focus();
        }

        function hideApiKeyModal() {
            apiKeyModal.classList.remove('visible');
        }

        function updateProgress(percent, text, status) {
            progressPercent.textContent = Math.round(percent) + '%';
            progressFill.style.width = percent + '%';
            if (text) progressText.textContent = text;
            if (status) progressStatus.textContent = status;
        }

        // Parse page range string
        function parsePageRange(rangeStr, maxPages) {
            if (!rangeStr.trim()) {
                return Array.from({ length: maxPages }, (_, i) => i + 1);
            }

            const pages = new Set();
            const parts = rangeStr.split(',');

            for (const part of parts) {
                const trimmed = part.trim();
                if (trimmed.includes('-')) {
                    const [start, end] = trimmed.split('-').map(n => parseInt(n.trim()));
                    for (let i = Math.max(1, start); i <= Math.min(maxPages, end); i++) {
                        pages.add(i);
                    }
                } else {
                    const num = parseInt(trimmed);
                    if (num >= 1 && num <= maxPages) {
                        pages.add(num);
                    }
                }
            }

            return Array.from(pages).sort((a, b) => a - b);
        }

        // File handling
        async function handleFileSelect(file) {
            if (!file) return;

            const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
            const isImage = file.type.startsWith('image/') || /\.(png|jpg|jpeg|bmp|tiff|tif)$/i.test(file.name);

            if (!isPDF && !isImage) {
                alert('請選擇 PDF 或圖片檔案');
                return;
            }

            selectedFile = file;
            fileName.textContent = `${file.name} (${formatFileSize(file.size)})`;

            if (isPDF) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    totalPages = pdfDoc.numPages;
                    pageCount.textContent = `共 ${totalPages} 頁`;
                    pageRangeInput.placeholder = `1-${totalPages}`;
                    currentPreviewPage = 1;
                    await renderPdfPage(1);
                } catch (error) {
                    console.error('PDF 載入失敗:', error);
                    alert('PDF 載入失敗: ' + error.message);
                    return;
                }
            } else {
                pdfDoc = null;
                totalPages = 1;
                pageCount.textContent = '圖片檔案';
                pageRangeInput.value = '';
                await renderImagePreview(file);
            }

            fileInfo.style.display = 'block';
            uploadZone.classList.add('has-file');
            actionButtons.style.display = 'flex';
            previewSection.classList.add('visible');
            updatePreviewNav();
        }

        async function renderPdfPage(pageNum) {
            if (!pdfDoc) return;

            const page = await pdfDoc.getPage(pageNum);
            const scale = 1.5;
            const viewport = page.getViewport({ scale });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({
                canvasContext: context,
                viewport: viewport
            }).promise;

            previewContainer.innerHTML = '';
            previewContainer.appendChild(canvas);
        }

        async function renderImagePreview(file) {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            previewContainer.innerHTML = '';
            previewContainer.appendChild(img);
        }

        function updatePreviewNav() {
            pageIndicator.textContent = `${currentPreviewPage} / ${totalPages}`;
            prevPageBtn.disabled = currentPreviewPage <= 1;
            nextPageBtn.disabled = currentPreviewPage >= totalPages;
        }

        // OCR processing
        async function performOCR() {
            if (!selectedFile) return;

            const language = languageSelect.value;
            const isPDF = pdfDoc !== null;
            let pagesToProcess = [1];

            if (isPDF) {
                pagesToProcess = parsePageRange(pageRangeInput.value, totalPages);
                if (pagesToProcess.length === 0) {
                    alert('請輸入有效的頁面範圍');
                    return;
                }
            }

            // Show progress
            progressSection.classList.add('visible');
            actionButtons.style.display = 'none';
            startOcrBtn.disabled = true;

            // Initialize Tesseract worker
            loadingOverlay.classList.add('visible');
            loadingText.textContent = '正在載入 OCR 引擎...';
            loadingSubtext.textContent = `載入 ${language} 語言模型中`;

            try {
                if (!worker) {
                    worker = await Tesseract.createWorker(language, 1, {
                        logger: (m) => {
                            if (m.status === 'loading tesseract core') {
                                loadingSubtext.textContent = '載入 Tesseract 核心...';
                            } else if (m.status === 'initializing tesseract') {
                                loadingSubtext.textContent = '初始化 Tesseract...';
                            } else if (m.status === 'loading language traineddata') {
                                loadingSubtext.textContent = `載入 ${language} 語言模型...`;
                            } else if (m.status === 'initializing api') {
                                loadingSubtext.textContent = '準備 OCR 引擎...';
                            }
                        }
                    });
                } else {
                    await worker.reinitialize(language);
                }

                loadingOverlay.classList.remove('visible');

                let allText = [];
                const totalSteps = pagesToProcess.length;

                for (let i = 0; i < pagesToProcess.length; i++) {
                    const pageNum = pagesToProcess[i];
                    const baseProgress = (i / totalSteps) * 100;
                    const stepSize = 100 / totalSteps;

                    updateProgress(
                        baseProgress,
                        isPDF ? `處理第 ${pageNum} 頁 (${i + 1}/${totalSteps})` : '正在辨識...',
                        isPDF ? `PDF 頁面 ${pageNum}` : '處理圖片中'
                    );

                    let imageData;

                    if (isPDF) {
                        // Render PDF page to canvas
                        const page = await pdfDoc.getPage(pageNum);
                        const scale = 2.0; // Higher resolution for better OCR
                        const viewport = page.getViewport({ scale });

                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        await page.render({
                            canvasContext: context,
                            viewport: viewport
                        }).promise;

                        imageData = canvas;
                    } else {
                        imageData = selectedFile;
                    }

                    // Perform OCR
                    updateProgress(baseProgress + stepSize * 0.5, null, `辨識中...`);
                    const result = await worker.recognize(imageData);

                    const text = result.data.text.trim();
                    if (text) {
                        if (isPDF && totalSteps > 1) {
                            allText.push(`=== 第 ${pageNum} 頁 ===\n${text}`);
                        } else {
                            allText.push(text);
                        }
                    }
                }

                updateProgress(100, '完成！', 'OCR 處理完成');

                // Show results
                const finalText = allText.join('\n\n');
                resultText.textContent = finalText || '未能辨識出任何文字';
                resultSection.classList.add('visible');

                // Reset UI
                setTimeout(() => {
                    progressSection.classList.remove('visible');
                    actionButtons.style.display = 'flex';
                    startOcrBtn.disabled = false;
                }, 1000);

            } catch (error) {
                console.error('OCR 失敗:', error);
                alert('OCR 處理失敗: ' + error.message);
                loadingOverlay.classList.remove('visible');
                progressSection.classList.remove('visible');
                actionButtons.style.display = 'flex';
                startOcrBtn.disabled = false;
            }
        }

        // Groq API for polishing
        async function polishText(text) {
            const apiKey = getApiKey();
            if (!apiKey) {
                showApiKeyModal();
                return;
            }

            polishBtn.disabled = true;
            polishBtn.textContent = '處理中...';

            try {
                const response = await fetch(GROQ_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            {
                                role: 'system',
                                content: '你是一個專業的繁體中文文字校對助手。以下是從掃描文件 OCR 辨識出的文字，可能包含辨識錯誤。請修正明顯的 OCR 錯誤，包括錯字、漏字、多餘字符，並整理成通順易讀的段落。保持原文意思，不要添加額外內容。直接輸出修正後的文字，不需要任何解釋。'
                            },
                            {
                                role: 'user',
                                content: text
                            }
                        ],
                        temperature: 0.2,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error?.message || `API 錯誤: ${response.status}`);
                }

                const data = await response.json();
                const polishedText = data.choices[0]?.message?.content?.trim() || '';

                polishTextEl.textContent = polishedText;
                polishSection.classList.add('visible');

            } catch (error) {
                console.error('潤飾失敗:', error);
                if (error.message.includes('401') || error.message.includes('invalid')) {
                    alert('API Key 無效，請重新設定');
                    localStorage.removeItem(STORAGE_KEY);
                    showApiKeyModal();
                } else {
                    alert('潤飾失敗: ' + error.message);
                }
            } finally {
                polishBtn.disabled = false;
                polishBtn.textContent = '✨ 潤飾';
            }
        }

        // Download text as file
        function downloadText(text, filename) {
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Copy to clipboard
        async function copyToClipboard(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
                const originalText = btn.textContent;
                btn.textContent = '已複製！';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            } catch (error) {
                console.error('複製失敗:', error);
            }
        }

        // Event listeners
        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files[0]);
        });

        startOcrBtn.addEventListener('click', performOCR);

        cancelBtn.addEventListener('click', () => {
            selectedFile = null;
            pdfDoc = null;
            fileInput.value = '';
            fileInfo.style.display = 'none';
            uploadZone.classList.remove('has-file');
            actionButtons.style.display = 'none';
            previewSection.classList.remove('visible');
            previewContainer.innerHTML = '';
        });

        prevPageBtn.addEventListener('click', async () => {
            if (currentPreviewPage > 1) {
                currentPreviewPage--;
                await renderPdfPage(currentPreviewPage);
                updatePreviewNav();
            }
        });

        nextPageBtn.addEventListener('click', async () => {
            if (currentPreviewPage < totalPages) {
                currentPreviewPage++;
                await renderPdfPage(currentPreviewPage);
                updatePreviewNav();
            }
        });

        copyBtn.addEventListener('click', () => copyToClipboard(resultText.textContent, copyBtn));
        copyPolishBtn.addEventListener('click', () => copyToClipboard(polishTextEl.textContent, copyPolishBtn));

        downloadBtn.addEventListener('click', () => {
            const baseName = selectedFile ? selectedFile.name.replace(/\.[^.]+$/, '') : 'ocr_result';
            downloadText(resultText.textContent, `${baseName}_ocr.txt`);
        });

        downloadPolishBtn.addEventListener('click', () => {
            const baseName = selectedFile ? selectedFile.name.replace(/\.[^.]+$/, '') : 'ocr_result';
            downloadText(polishTextEl.textContent, `${baseName}_polished.txt`);
        });

        polishBtn.addEventListener('click', () => {
            const text = resultText.textContent.trim();
            if (text) polishText(text);
        });

        clearBtn.addEventListener('click', () => {
            resultText.textContent = '';
            polishTextEl.textContent = '';
            resultSection.classList.remove('visible');
            polishSection.classList.remove('visible');
        });

        // Modal events
        closeModal.addEventListener('click', hideApiKeyModal);
        cancelApiKey.addEventListener('click', hideApiKeyModal);

        confirmApiKey.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                alert('請輸入 API Key');
                return;
            }
            if (saveApiKeyCheckbox.checked) {
                saveApiKeyToStorage(key);
            }
            hideApiKeyModal();
            const text = resultText.textContent.trim();
            if (text) polishText(text);
        });

        apiKeyModal.addEventListener('click', (e) => {
            if (e.target === apiKeyModal) hideApiKeyModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && apiKeyModal.classList.contains('visible')) {
                hideApiKeyModal();
            }
        });
    </script>
</body>
</html>
